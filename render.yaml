services:
  - name: krishiconnect-backend
    type: web
    env: python
    rootDir: prototype
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # you'll set this manually in Render dashboardsss